<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" shape-rendering="crispEdges">
  <!-- turf background -->
  <rect width="180" height="180" fill="#1a5c2e"/>
  <!-- yellow border accent -->
  <rect x="6" y="6" width="168" height="168" fill="none" stroke="#ffd23f" stroke-width="6"/>
  <!-- football body, scaled up from 32x32 grid (multiply coords by ~5.6, center it) -->
  <g transform="translate(22,22) scale(4.25)">
    <rect x="12" y="8"  width="8"  height="2" fill="#8b4513"/>
    <rect x="10" y="10" width="12" height="2" fill="#8b4513"/>
    <rect x="8"  y="12" width="16" height="2" fill="#8b4513"/>
    <rect x="6"  y="14" width="20" height="4" fill="#8b4513"/>
    <rect x="8"  y="18" width="16" height="2" fill="#8b4513"/>
    <rect x="10" y="20" width="12" height="2" fill="#8b4513"/>
    <rect x="12" y="22" width="8"  height="2" fill="#8b4513"/>
    <rect x="14" y="14" width="4" height="1" fill="#ffffff"/>
    <rect x="14" y="16" width="4" height="1" fill="#ffffff"/>
    <rect x="13" y="15" width="6" height="1" fill="#ffffff"/>
    <rect x="6"  y="15" width="2" height="2" fill="#ffffff"/>
    <rect x="24" y="15" width="2" height="2" fill="#ffffff"/>
  </g>
</svg>
